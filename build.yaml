include:
  # 右手側がトラックボール(セントラル)、左手側がトラックパッド(ペリフェラル)の構成
  - board: bmp_boost
    shield: torabo_tsuki_lp_right
    # split-central: USB接続側(セントラル)として動作
    # input-trackball: トラックボールを有効化
    # input-listener: セントラル側のトラックボール入力を処理
    # input-split-listener: ペリフェラル(左手側トラックパッド)からの入力を受信
    snippet: "studio-rpc-usb-uart split-central input-trackball input-listener input-split-listener"
    artifact-name: torabo_tsuki_lp_right_central
  - board: bmp_boost
    shield: torabo_tsuki_lp_left
    # input-trackpad-mini: ミニトラックパッドを有効化
    # input-split: ペリフェラル側の入力をセントラルへ無線送信
    snippet: "studio-rpc-usb-uart input-trackpad-mini input-split"
    artifact-name: torabo_tsuki_lp_trackpad_left_peripheral
  - board: bmp_boost
    shield: settings_reset